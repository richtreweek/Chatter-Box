<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatter Box Template</title>
<style>

    textarea {
        border: 1px solid #ccc; 

	    font-family: Arial, sans-serif;
    font-size: 14px;
    }
        textarea:focus {
        border: 1px solid #ccc; 
        outline: none; 
    }

</style>


</head>
<body>

    <h1>Chat Box</h1>


    <script>
	    // Create a new textarea element
let textarea = document.createElement("textarea");

// Set its initial content (optional)
textarea.value = "";
textarea.readOnly = true;
// Set attributes like rows and cols (optional)
textarea.style.marginLeft = '30px';
textarea.setAttribute("rows", "35");
textarea.setAttribute("cols", "50");
textarea.readOnly = true;


// Append the textarea to the body of the HTML document
document.body.appendChild(textarea);
	    </script>
	    <br><br><br>
	    <script>
let textarea2 = document.createElement("textarea");




// Set attributes like rows and cols (optional)
textarea2.style.marginLeft = '30px';
textarea2.setAttribute("rows", "5");
textarea2.setAttribute("cols", "50");
textarea2.placeholder = "Choose your username";
document.body.appendChild(textarea2);
let username = null;



/* below is the line that needs to be edited by the web dev*/
/* replace "localhost" with the address of the server you're using  */
/* and replace "<chatroom_name>" with the name you want to use for your chatroom */
/* you might also have to change the port numer */
const socket = new WebSocket("ws://localhost:8000?userId=<chatroom_name>");




socket.onopen = (event) => {
textarea2.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
            		event.preventDefault();
           		socket.send(textarea2.value);
	    		textarea2.removeAttribute('placeholder');
            		textarea2.value = "";
            }
});
}
	socket.onmessage = function(event) {
		if(event.data != "Name used") {
    			  textarea2.maxLength = 50000; 
	    		  textarea2.value = "";
			textarea.value = (textarea.value + event.data + "\n");

		}else{
                       textarea2.placeholder = "That name is already being used, choose another.";
		}
};

</script>
</body>
</html>
